# IMPORTANT: Values here are base64-encoded, NOT plain text.
# To encode your own password: echo -n "yourpassword" | base64
# Current values decode to: postgres / nagp@2026secure
#
# "postgres" in base64    = cG9zdGdyZXM=
# "nagp@2026secure" in base64 = bmFncEAyMDI2c2VjdXJl

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: nagp-app
type: Opaque
data:
  # echo -n "postgres" | base64
  db-username: cG9zdGdyZXM=
  # echo -n "nagp@2026secure" | base64
  db-password: bmFncEAyMDI2c2VjdXJl
