version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: nagp-postgres
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
      networks:
        - s-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-api:
    build: .                        # builds from your Dockerfile
    container_name: nagp-products-api
    ports:
      - "8090:8080"
    environment:
      DB_HOST: postgres             # refers to the service name above
      DB_PORT: 5431
      DB_NAME: productsdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy  # waits for postgres to be ready

  networks:
    s-network:
      driver: bridge

volumes:
  postgres-data: